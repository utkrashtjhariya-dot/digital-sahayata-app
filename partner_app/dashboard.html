<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Partner App | Digital Sahayata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --bg: #f4f7f6; --surface: #ffffff; --text-dark: #111827; --text-mute: #6b7280; 
            --primary: #000000; --accent: #22c55e; --border: #e5e7eb; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-dark); padding-bottom: 100px; overflow-x: hidden; }

        /* Premium Header */
        .top-bar {
            background: var(--surface); padding: 20px 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .profile-sec { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: #f3f4f6; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border: 2px solid var(--border); }
        .greeting p { font-size: 0.75rem; color: var(--text-mute); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .greeting h2 { font-size: 1.1rem; font-weight: 800; }

        /* Status Toggle */
        .status-toggle {
            background: #dcfce7; color: #166534; padding: 8px 16px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px;
            border: 1px solid #bbf7d0; box-shadow: 0 2px 10px rgba(34, 197, 94, 0.2);
        }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Earning Card (Uber Style) */
        .dashboard-wrapper { padding: 20px; }
        .earning-card {
            background: var(--primary); color: white; border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; overflow: hidden;
            margin-bottom: 25px;
        }
        .earning-card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .e-title { font-size: 0.9rem; color: #9ca3af; font-weight: 500; margin-bottom: 5px; }
        .e-amount { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; }
        .e-stats { display: flex; gap: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .e-stat-item div:first-child { font-size: 0.75rem; color: #9ca3af; }
        .e-stat-item div:last-child { font-size: 1.1rem; font-weight: 700; }

        /* Section Title */
        .sec-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; color: var(--text-dark); display: flex; align-items: center; justify-content: space-between; }
        .pulse-badge { background: #fee2e2; color: #dc2626; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; border: 1px solid #fecaca; }

        /* Premium Order Card */
        .order-card {
            background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid var(--border);
            transition: 0.3s; position: relative;
        }
        .order-card::before {
            content: ''; position: absolute; left: 0; top: 20px; bottom: 20px; width: 4px;
            background: #f59e0b; border-radius: 0 4px 4px 0;
        }
        .order-card.accepted::before { background: var(--accent); }
        
        .o-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .o-service { font-size: 1.2rem; font-weight: 800; color: var(--text-dark); line-height: 1.2; }
        .o-id { font-size: 0.75rem; color: var(--text-mute); font-weight: 600; margin-top: 4px; }
        .o-price { font-size: 1.3rem; font-weight: 800; color: var(--primary); background: #f3f4f6; padding: 6px 12px; border-radius: 12px; }

        .o-customer {
            display: flex; align-items: center; gap: 12px; background: #f9fafb; padding: 12px;
            border-radius: 12px; margin-bottom: 15px; border: 1px solid #f3f4f6;
        }
        .c-icon { width: 35px; height: 35px; background: #e5e7eb; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-mute); }
        .c-info h4 { font-size: 0.9rem; font-weight: 700; }
        .c-info p { font-size: 0.8rem; color: var(--text-mute); font-weight: 500; margin-top: 2px; }

        /* Action Buttons */
        .btn-swipe {
            width: 100%; background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-swipe:active { transform: scale(0.98); }
        .btn-accepted {
            width: 100%; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0;
            padding: 16px; border-radius: 14px; font-size: 1.05rem; font-weight: 700; text-align: center;
        }

        /* Floating Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; width: 90%; max-width: 400px;
            padding: 15px 25px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.4); z-index: 100;
        }
        .nav-item { color: #9ca3af; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 700; gap: 6px; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="profile-sec">
            <div class="avatar"><i class="fas fa-store"></i></div>
            <div class="greeting">
                <p>MP Online Center</p>
                <h2>Lucky Partner</h2>
            </div>
        </div>
        <div class="status-toggle">
            <div class="status-dot"></div> Online
        </div>
    </div>

    <div class="dashboard-wrapper">
        <div class="earning-card">
            <div class="e-title">Today's Earnings</div>
            <div class="e-amount">₹<span id="partnerEarning">0</span></div>
            <div class="e-stats">
                <div class="e-stat-item">
                    <div>Completed Jobs</div>
                    <div id="jobsDone">0</div>
                </div>
                <div class="e-stat-item">
                    <div>Online Hours</div>
                    <div>4.5h</div>
                </div>
            </div>
        </div>

        <div class="sec-title">
            <span>Live Requests</span>
            <span class="pulse-badge">Looking for jobs...</span>
        </div>
        
        <div id="partnerOrderList">
            <div style="text-align: center; padding: 40px 20px; color: var(--text-mute);">
                <i class="fas fa-radar fa-spin" style="font-size: 2.5rem; color: var(--border); margin-bottom: 15px;"></i>
                <p style="font-size: 0.9rem; font-weight: 500;">Scanning your area for new jobs...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-layer-group"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i></a>
        <a href="#" class="nav-item"><i class="fas fa-history"></i></a>
        <a href="../index.html" class="nav-item"><i class="fas fa-user-circle"></i></a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmdEmqUIiP0hr_Ixfu6s83KBJfeTHgFkw",
            authDomain: "digital-sahayata-f3ede.firebaseapp.com",
            projectId: "digital-sahayata-f3ede",
            storageBucket: "digital-sahayata-f3ede.firebasestorage.app",
            messagingSenderId: "532380574288",
            appId: "1:532380574288:web:f306370320e448f09b6755"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const MY_PARTNER_ID = "PRT_MP_001"; 

        db.collection("3_ORDERS").orderBy("created_at", "desc").onSnapshot((snapshot) => {
            const orderListDiv = document.getElementById("partnerOrderList");
            let htmlContent = "";
            let jobsCount = 0;
            let totalEarnings = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                if (data.order_status === "NEW_REQUEST" || (data.order_status === "PROCESSING" && data.assigned_partner_id === MY_PARTNER_ID)) {
                    
                    let serviceName = data.service_requested.toUpperCase().replace("_", " ");
                    let partnerCut = Math.floor(data.total_amount_inr * 0.90); 
                    let isAcceptedByMe = data.order_status === "PROCESSING";
                    
                    if (isAcceptedByMe) {
                        jobsCount++;
                        totalEarnings += partnerCut;
                    }

                    let btnHtml = isAcceptedByMe 
                        ? `<div class="btn-accepted"><i class="fas fa-check-circle"></i> Processing Order</div>`
                        : `<button class="btn-swipe" onclick="acceptOrder('${doc.id}')">Accept & Earn ₹${partnerCut}</button>`;

                    htmlContent += `
                        <div class="order-card ${isAcceptedByMe ? 'accepted' : ''}">
                            <div class="o-header">
                                <div>
                                    <div class="o-service">${serviceName}</div>
                                    <div class="o-id">REQ #${data.order_id}</div>
                                </div>
                                <div class="o-price">₹${data.total_amount_inr}</div>
                            </div>
                            <div class="o-customer">
                                <div class="c-icon"><i class="fas ${isAcceptedByMe ? 'fa-user-check' : 'fa-user-lock'}"></i></div>
                                <div class="c-info">
                                    <h4>${data.customer_name}</h4>
                                    <p>${isAcceptedByMe ? data.contact_phone : '+91 ******' + data.contact_phone.slice(-4)}</p>
                                </div>
                            </div>
                            ${btnHtml}
                        </div>
                    `;
                }
            });

            if (htmlContent === "") {
                orderListDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-mute); background: white; border-radius: 20px; border: 1px dashed var(--border);">
                        <i class="fas fa-mug-hot" style="font-size: 2rem; color: #d1d5db; margin-bottom: 10px;"></i>
                        <p style="font-size: 0.9rem; font-weight: 500;">No active requests in your area.<br>Take a break!</p>
                    </div>`;
            } else {
                orderListDiv.innerHTML = htmlContent;
            }

            document.getElementById("jobsDone").innerText = jobsCount;
            document.getElementById("partnerEarning").innerText = totalEarnings;
        });

        function acceptOrder(docId) {
            db.collection("3_ORDERS").doc(docId).update({
                order_status: "PROCESSING",
                assigned_partner_id: MY_PARTNER_ID,
                updated_at: firebase.firestore.FieldValue.serverTimestamp()
            })
            .catch((error) => {
                console.error("Error accepting order: ", error);
                alert("Order pehle hi kisi aur ne le liya hai!");
            });
        }
    </script>
</body>
</html>
