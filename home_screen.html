<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Sahayata | Customer App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* The 100x Architecture Design System */
        :root {
            --app-bg: #f8fafc;
            --surface-white: #ffffff;
            --text-dark: #0f172a;
            --text-mute: #64748b;
            --brand-primary: #2563eb;
            --brand-gradient: linear-gradient(135deg, #2563eb, #4f46e5);
            --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--app-bg); 
            color: var(--text-dark); 
            overflow-x: hidden;
            /* iPhone Notch/Safe Area support */
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* Top Native App Header */
        .app-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .user-greeting p { font-size: 0.8rem; color: var(--text-mute); font-weight: 500; }
        .user-greeting h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .profile-avatar {
            width: 42px; height: 42px;
            background: var(--brand-gradient);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* Blueprint: Main Promo Card */
        .promo-container { padding: 20px; }
        .promo-card {
            background: var(--text-dark);
            border-radius: 24px;
            padding: 30px 25px;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .promo-card::after {
            content: ''; position: absolute; right: -30px; bottom: -30px;
            width: 150px; height: 150px;
            background: var(--brand-primary);
            border-radius: 50%; filter: blur(40px); opacity: 0.5;
        }
        .promo-card h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; position: relative; z-index: 2; }
        .promo-card p { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 20px; position: relative; z-index: 2; }
        .action-btn {
            background: white; color: var(--text-dark);
            border: none; padding: 12px 24px; border-radius: 12px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            position: relative; z-index: 2;
        }

        /* Blueprint: Services Grid Engine */
        .section-heading {
            padding: 0 20px; margin: 10px 0 20px 0;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .section-heading h3 { font-size: 1.2rem; font-weight: 800; }
        .section-heading span { font-size: 0.85rem; color: var(--brand-primary); font-weight: 600; cursor: pointer; }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 0 20px;
        }

        .service-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer;
        }
        .service-icon-wrapper {
            width: 100%; aspect-ratio: 1;
            background: var(--surface-white);
            border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.6rem; color: var(--brand-primary);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }
        .service-item:active .service-icon-wrapper { transform: scale(0.92); }
        .service-item span { font-size: 0.75rem; font-weight: 600; text-align: center; color: var(--text-dark); }

        /* Modern Bottom Navigation (iOS Style) */
        .bottom-nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-around;
            padding: 15px 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-mute); border: none; background: transparent; cursor: pointer;
        }
        .nav-btn.active { color: var(--brand-primary); }
        .nav-btn i { font-size: 1.4rem; }
        .nav-btn span { font-size: 0.7rem; font-weight: 600; }

    </style>
</head>
<body>

    <header class="app-header">
        <div class="user-greeting">
            <p>Welcome back</p>
            <h1>Mandla Hub HQ</h1>
        </div>
        <div class="profile-avatar">
            <i class="fas fa-user-tie"></i>
        </div>
    </header>

    <div class="promo-container">
        <div class="promo-card">
            <h2>Priority Network</h2>
            <p>Access fast, secure, and professional digital services instantly.</p>
            <button class="action-btn">Scan Documents</button>
        </div>
    </div>

    <div class="section-heading">
        <h3>Explore Services</h3>
        <span>View all</span>
    </div>

    <div class="service-grid">
        <div class="service-item">
            <div class="service-icon-wrapper" style="color: #2563eb; background: #eff6ff;"><i class="fas fa-address-card"></i></div>
            <span>ID Update</span>
        </div>
        <div class="service-item">
            <div class="service-icon-wrapper" style="color: #10b981; background: #ecfdf5;"><i class="fas fa-briefcase"></i></div>
            <span>Startup</span>
        </div>
        <div class="service-item">
            <div class="service-icon-wrapper" style="color: #8b5cf6; background: #f5f3ff;"><i class="fas fa-gavel"></i></div>
            <span>Legal</span>
        </div>
        <div class="service-item">
            <div class="service-icon-wrapper" style="color: #f59e0b; background: #fffbeb;"><i class="fas fa-file-invoice-dollar"></i></div>
            <span>Taxes</span>
        </div>
        
        <div class="service-item" style="margin-top: 10px;">
            <div class="service-icon-wrapper" style="color: #ef4444; background: #fef2f2;"><i class="fas fa-laptop-code"></i></div>
            <span>IT Help</span>
        </div>
        <div class="service-item" style="margin-top: 10px;">
            <div class="service-icon-wrapper" style="color: #06b6d4; background: #ecfeff;"><i class="fas fa-paint-brush"></i></div>
            <span>Design</span>
        </div>
        <div class="service-item" style="margin-top: 10px;">
            <div class="service-icon-wrapper" style="color: #f43f5e; background: #fff1f2;"><i class="fas fa-print"></i></div>
            <span>Print</span>
        </div>
        <div class="service-item" style="margin-top: 10px;">
            <div class="service-icon-wrapper" style="color: #64748b; background: #f8fafc;"><i class="fas fa-ellipsis-h"></i></div>
            <span>More</span>
        </div>
    </div>

    <nav class="bottom-nav-bar">
        <button class="nav-btn active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-btn">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </button>
        <button class="nav-btn">
            <i class="fas fa-file-alt"></i>
            <span>Orders</span>
        </button>
        <button class="nav-btn">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </button>
    </nav>

</body>
</html>
