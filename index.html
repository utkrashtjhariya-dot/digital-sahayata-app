<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Sahayata | Premium</title>
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Engine -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #050505; 
            background-image: radial-gradient(circle at top right, #1d4ed8 0%, transparent 40%), 
                              radial-gradient(circle at bottom left, #7e22ce 0%, transparent 40%);
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }

        /* Top Navigation Bar */
        .navbar {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 30px;
        }
        
        .nav-logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-profile { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }

        /* Premium Glass Card */
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-text { margin-bottom: 30px; }
        .header-text h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .header-text p { color: #9ca3af; font-size: 0.9rem; }

        /* Modern Input Fields */
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: #6b7280; }
        
        input, select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            appearance: none;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.2);
        }

        select option { background: #0f172a; color: white; }

        /* Gradient Premium Button */
        .premium-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .premium-btn:active { transform: scale(0.96); }

        #statusMsg { text-align: center; margin-top: 20px; font-size: 0.9rem; font-weight: 500; min-height: 20px; }
        .success-text { color: #34d399; }
        .error-text { color: #f87171; }
        .loading-text { color: #60a5fa; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-logo"><i class="fas fa-bolt"></i> Sahayata</div>
        <div class="nav-profile"><i class="fas fa-user"></i></div>
    </div>

    <div class="glass-card">
        <div class="header-text">
            <h2>New Request</h2>
            <p>Fast, Secure & Professional Services</p>
        </div>

        <div class="input-group">
            <i class="fas fa-user-circle"></i>
            <input type="text" id="custName" placeholder="Full Name" required autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="custPhone" placeholder="WhatsApp Number" required autocomplete="off">
        </div>
        
        <div class="input-group">
            <i class="fas fa-briefcase"></i>
            <select id="serviceType">
                <option value="" disabled selected>Select a Service...</option>
                <option value="Aadhaar/PAN Update">Aadhaar/PAN Update</option>
                <option value="Startup/MSME Reg">Startup / MSME Registration</option>
                <option value="Creative Design Task">Creative Design Task</option>
                <option value="Legal Consulting">Legal & Financial Consulting</option>
            </select>
        </div>
        
        <button class="premium-btn" onclick="launchToDatabase()">Submit Request <i class="fas fa-arrow-right" style="margin-left:8px;"></i></button>
        <div id="statusMsg"></div>
    </div>

    <script>
        // Aapki Secret Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBmdEmqUiIP0hr_Ixfu6s83KBJfeTHgFkw",
            authDomain: "digital-sahayata-f3ede.firebaseapp.com",
            projectId: "digital-sahayata-f3ede",
            storageBucket: "digital-sahayata-f3ede.firebasestorage.app",
            messagingSenderId: "532380574288",
            appId: "1:532380574288:web:f306370320e448f09b6755",
            measurementId: "G-DQDZ3WFKP5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function launchToDatabase() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const service = document.getElementById('serviceType').value;
            const statusDiv = document.getElementById('statusMsg');

            if(!name || !phone || !service) {
                statusDiv.innerHTML = "<span class='error-text'><i class='fas fa-exclamation-circle'></i> Please fill all fields correctly.</span>";
                return;
            }

            statusDiv.innerHTML = "<span class='loading-text'><i class='fas fa-circle-notch fa-spin'></i> Securing your request...</span>";

            db.collection("Orders").add({
                customerName: name,
                customerPhone: phone,
                serviceName: service,
                status: "Pending Assignment",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then((docRef) => {
                statusDiv.innerHTML = "<span class='success-text'><i class='fas fa-check-circle'></i> Request submitted successfully!</span>";
                setTimeout(() => {
                    document.getElementById('custName').value = '';
                    document.getElementById('custPhone').value = '';
                    document.getElementById('serviceType').value = '';
                    statusDiv.innerHTML = "";
                }, 3000);
            })
            .catch((error) => {
                statusDiv.innerHTML = "<span class='error-text'><i class='fas fa-times-circle'></i> Connection failed. Try again.</span>";
            });
        }
    </script>
</body>
</html>
