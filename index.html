<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Sahayata Network</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Real System SDKs (Yeh App ka Dimaag Hai) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .startup-container { text-align: center; padding: 30px; }
        .logo-box { width: 100px; height: 100px; background: #3b82f6; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 20px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5); }
        
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        h1 span { color: #3b82f6; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 40px; }
        
        .status-box { background: #1e293b; border: 2px solid #334155; padding: 20px; border-radius: 15px; width: 100%; max-width: 350px; margin: 0 auto; }
        .pulse { display: inline-block; width: 12px; height: 12px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse-anim 1.5s infinite; margin-right: 10px; }
        
        @keyframes pulse-anim { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        .btn-connect { background: #3b82f6; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 600; border-radius: 12px; margin-top: 30px; width: 100%; max-width: 350px; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        
        .footer { position: fixed; bottom: 20px; color: #475569; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="startup-container">
        <div class="logo-box"><i class="fas fa-bolt"></i></div>
        <h1>Digital<span>Sahayata</span></h1>
        <p>India's Smartest Service Network</p>

        <div class="status-box">
            <h3 style="font-size: 1.1rem; color: #f8fafc;"><span class="pulse"></span> System Online</h3>
            <p style="margin: 10px 0 0; font-size: 0.9rem; color: #64748b;">Firebase Engine: Standby<br>Katra, Mandla HQ Connected</p>
        </div>

        <button class="btn-connect" onclick="alert('System Ready: Next update mein hum is button ko seedha Firebase Database se connect karenge!')">Initialize System</button>
    </div>

    <div class="footer">Founder: Utkrasth Jhariya | V 1.0.0</div>

</body>
</html>
