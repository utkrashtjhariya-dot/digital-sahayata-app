<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Booking Engine | Digital Sahayata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-light: #64748b;
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --success: #10b981;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        /* Top Nav - Back Button */
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            padding-top: calc(15px + env(safe-area-inset-top));
        }
        .back-btn { font-size: 1.2rem; color: var(--text-main); cursor: pointer; text-decoration: none; }
        .header h2 { font-size: 1.1rem; font-weight: 700; }

        /* Service Banner Details */
        .service-hero {
            background: var(--surface);
            padding: 25px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 20px; align-items: center;
        }
        .service-icon {
            width: 70px; height: 70px;
            background: #eff6ff; color: var(--primary);
            border-radius: 20px; font-size: 2rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 15px var(--primary-glow);
        }
        .service-info h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; }
        .service-info p { color: var(--text-light); font-size: 0.85rem; font-weight: 500; }
        .rating { color: #f59e0b; font-size: 0.8rem; margin-top: 5px; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        /* Multi-Step Form Container */
        .form-container { padding: 20px; flex: 1; }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; position: relative; }
        .step-indicator::before {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: var(--border); z-index: 1; transform: translateY(-50%);
        }
        .step {
            width: 30px; height: 30px; border-radius: 50%; background: var(--surface);
            border: 2px solid var(--border); display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; font-weight: 700; color: var(--text-light); position: relative; z-index: 2;
            transition: 0.3s;
        }
        .step.active { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 0 15px var(--primary-glow); }
        .step.completed { border-color: var(--success); background: var(--success); color: white; }

        /* Input Fields */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
        .input-field {
            width: 100%; padding: 16px; border: 1px solid var(--border);
            border-radius: 14px; font-size: 1rem; color: var(--text-main);
            background: var(--surface); transition: 0.3s; outline: none;
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        
        /* Action Button */
        .bottom-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--surface); padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            box-shadow: 0 -10px 20px rgba(0,0,0,0.03);
        }
        .btn-primary {
            width: 100%; padding: 18px; border: none; border-radius: 14px;
            background: var(--primary); color: white; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* Step Sections (Hidden by default) */
        .form-step-content { display: none; animation: fadeIn 0.4s ease; }
        .form-step-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="header">
        <a href="home_screen.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>Book Service</h2>
    </div>

    <div class="service-hero">
        <div class="service-icon"><i class="fas fa-id-card"></i></div>
        <div class="service-info">
            <h1 id="selectedServiceTitle">Aadhaar/PAN Update</h1>
            <p>Mandla HQ Priority Processing</p>
            <div class="rating"><i class="fas fa-star"></i> 4.9 (2k+ Served)</div>
        </div>
    </div>

    <div class="form-container">
        <div class="step-indicator">
            <div class="step active" id="dot1">1</div>
            <div class="step" id="dot2">2</div>
            <div class="step" id="dot3"><i class="fas fa-check"></i></div>
        </div>

        <div class="form-step-content active" id="step1">
            <h3 style="margin-bottom: 20px; font-weight: 800;">Client Details</h3>
            
            <div class="input-group">
                <label>Full Legal Name</label>
                <input type="text" id="custName" class="input-field" placeholder="E.g. Utkrasth Jhariya" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="custPhone" class="input-field" placeholder="+91" autocomplete="off">
            </div>
        </div>

        <div class="form-step-content" id="step2">
            <h3 style="margin-bottom: 20px; font-weight: 800;">Additional Info</h3>
            
            <div class="input-group">
                <label>Location Area</label>
                <input type="text" id="custLocation" class="input-field" placeholder="E.g. Katra, Mandla" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Priority Level</label>
                <select id="custPriority" class="input-field">
                    <option value="Normal">Normal (2-3 Days)</option>
                    <option value="Urgent">Urgent (24 Hours) +₹50</option>
                </select>
            </div>
        </div>
        
        <div class="form-step-content" id="step3" style="text-align: center; margin-top: 40px;">
            <i class="fas fa-check-circle" style="font-size: 5rem; color: var(--success); margin-bottom: 20px;"></i>
            <h2 style="font-weight: 800; margin-bottom: 10px;">Order Secured!</h2>
            <p style="color: var(--text-light); font-size: 0.9rem;">Your request has been locked in our cloud vault. A partner will contact you shortly.</p>
        </div>
    </div>

    <div class="bottom-action" id="actionContainer">
        <button class="btn-primary" id="mainActionBtn" onclick="nextStep()">Continue <i class="fas fa-arrow-right"></i></button>
    </div>

    <script>
        // Firebase Config Engine
        const firebaseConfig = {
            apiKey: "AIzaSyBmdEmqUiIP0hr_Ixfu6s83KBJfeTHgFkw",
            authDomain: "digital-sahayata-f3ede.firebaseapp.com",
            projectId: "digital-sahayata-f3ede",
            storageBucket: "digital-sahayata-f3ede.firebasestorage.app",
            messagingSenderId: "532380574288",
            appId: "1:532380574288:web:f306370320e448f09b6755"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStep = 1;
        const serviceName = "Aadhaar/PAN Update"; // Dynamically fetched in real app

        function nextStep() {
            if(currentStep === 1) {
                const name = document.getElementById('custName').value.trim();
                const phone = document.getElementById('custPhone').value.trim();
                
                if(!name || !phone) {
                    alert("Please enter Name and Phone!");
                    return;
                }
                
                // Move to Step 2
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                
                document.getElementById('dot1').classList.add('completed');
                document.getElementById('dot1').innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('dot2').classList.add('active');
                
                document.getElementById('mainActionBtn').innerHTML = 'Confirm Booking <i class="fas fa-lock"></i>';
                currentStep = 2;
                
            } else if(currentStep === 2) {
                submitToDatabase();
            }
        }

        function submitToDatabase() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const location = document.getElementById('custLocation').value.trim();
            const priority = document.getElementById('custPriority').value;
            const btn = document.getElementById('mainActionBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.style.opacity = '0.8';

            // Send Real Data to Firestore
            db.collection("Orders").add({
                customerName: name,
                customerPhone: phone,
                customerLocation: location || "Not Provided",
                priority: priority,
                serviceName: serviceName,
                status: "Pending Assignment",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                // Move to Step 3 (Success)
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                
                document.getElementById('dot2').classList.add('completed');
                document.getElementById('dot2').innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('dot3').classList.add('completed');
                
                // Hide action button
                document.getElementById('actionContainer').style.display = 'none';
            })
            .catch((error) => {
                console.error("Database Error: ", error);
                btn.innerHTML = 'Error! Try Again';
                btn.style.background = '#ef4444';
            });
        }
    </script>
</body>
</html>
