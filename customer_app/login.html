<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Login | Digital Sahayata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text-dark: #0f172a; --text-mute: #64748b;
            --brand-blue: #2563eb; --brand-light: #eff6ff; --border: #e2e8f0; --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-container {
            background: var(--surface); width: 100%; max-width: 450px;
            border-radius: 24px; padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border); text-align: center;
        }

        .auth-header i { font-size: 3rem; color: var(--brand-blue); margin-bottom: 20px; }
        .auth-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-dark); margin-bottom: 10px; letter-spacing: -0.5px; }
        .auth-header p { color: var(--text-mute); font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
        
        .phone-input-wrapper { display: flex; align-items: center; border: 2px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.2s; background: var(--bg); }
        .phone-input-wrapper:focus-within { border-color: var(--brand-blue); background: var(--surface); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .country-code { padding: 15px; font-weight: 700; color: var(--text-dark); background: var(--border); border-right: 1px solid var(--border); }
        
        .input-group input {
            width: 100%; padding: 15px; border: none; outline: none;
            font-size: 1.1rem; font-weight: 600; color: var(--text-dark); background: transparent;
        }

        .btn-primary {
            width: 100%; padding: 16px; background: var(--brand-blue); color: white;
            border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.25); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

        #recaptcha-container { margin: 20px 0; display: flex; justify-content: center; }

        /* OTP Section Hidden by Default */
        #otp-section { display: none; }
        
        .status-msg { margin-top: 15px; font-size: 0.85rem; font-weight: 600; }
        .error-msg { color: #ef4444; }
        .success-msg { color: var(--success); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-shield-alt"></i>
            <h1>Secure Login</h1>
            <p>Enter your mobile number to access India's largest service network.</p>
        </div>

        <div id="phone-section">
            <div class="input-group">
                <label>Mobile Number</label>
                <div class="phone-input-wrapper">
                    <span class="country-code">+91</span>
                    <input type="tel" id="phoneNumber" placeholder="Enter 10 digit number" maxlength="10" autocomplete="off">
                </div>
            </div>
            
            <div id="recaptcha-container"></div>
            
            <button class="btn-primary" id="sendOtpBtn" onclick="sendOTP()">
                Send Secure OTP <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <div id="otp-section">
            <div class="input-group">
                <label>Enter 6-Digit OTP</label>
                <div class="phone-input-wrapper" style="padding-left: 15px;">
                    <input type="number" id="otpCode" placeholder="• • • • • •" maxlength="6" autocomplete="off" style="letter-spacing: 10px; text-align: center;">
                </div>
            </div>
            
            <button class="btn-primary" id="verifyOtpBtn" onclick="verifyOTP()" style="background: var(--success);">
                Verify & Login <i class="fas fa-check-circle"></i>
            </button>
            <button onclick="window.location.reload()" style="background: transparent; border: none; color: var(--brand-blue); font-weight: 700; margin-top: 20px; cursor: pointer;">Change Number</button>
        </div>

        <div id="system-msg" class="status-msg"></div>
    </div>

    <script>
        // NOTE FOR CEO: This is a placeholder Firebase config. 
        // In the next module, we will generate your REAL API keys from the Google Cloud Console.
        const firebaseConfig = {
            apiKey: "AIzaSy_YOUR_REAL_API_KEY_HERE_xxxxxxxxxxx",
            authDomain: "digitalsahayata-app.firebaseapp.com",
            projectId: "digitalsahayata-app",
            storageBucket: "digitalsahayata-app.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // Initialize Firebase Backend
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        auth.useDeviceLanguage(); // Automatically sets SMS language based on device

        let confirmationResultObj = null;

        // Initialize Invisible reCAPTCHA
        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal',
                'callback': (response) => {
                    // reCAPTCHA solved, allow sending OTP
                    document.getElementById('sendOtpBtn').disabled = false;
                }
            });
            window.recaptchaVerifier.render();
        };

        function showMsg(text, type) {
            const msgBox = document.getElementById('system-msg');
            msgBox.textContent = text;
            msgBox.className = 'status-msg ' + (type === 'error' ? 'error-msg' : 'success-msg');
        }

        // ENGINE: Send OTP Function
        function sendOTP() {
            const phoneVal = document.getElementById('phoneNumber').value;
            if(phoneVal.length !== 10) {
                showMsg("Invalid Format! Please enter a valid 10-digit Indian number.", "error");
                return;
            }

            const fullNumber = "+91" + phoneVal;
            const btn = document.getElementById('sendOtpBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            const appVerifier = window.recaptchaVerifier;

            // This triggers the real SMS via Google's servers
            auth.signInWithPhoneNumber(fullNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResultObj = confirmationResult;
                    
                    // UI Switch
                    document.getElementById('phone-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    showMsg("OTP Sent successfully to " + fullNumber, "success");
                })
                .catch((error) => {
                    console.error("Firebase Auth Error:", error);
                    showMsg("System Error: Check API Keys or Network.", "error");
                    btn.innerHTML = 'Send Secure OTP <i class="fas fa-paper-plane"></i>';
                    btn.disabled = false;
                    window.recaptchaVerifier.reset();
                });
        }

        // ENGINE: Verify OTP Function
        function verifyOTP() {
            const otpVal = document.getElementById('otpCode').value;
            if(otpVal.length !== 6) {
                showMsg("Enter the exact 6-digit OTP received.", "error");
                return;
            }

            const btn = document.getElementById('verifyOtpBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
            btn.disabled = true;

            window.confirmationResultObj.confirm(otpVal)
                .then((result) => {
                    const user = result.user;
                    console.log("Authentication 100% Successful. User UID:", user.uid);
                    showMsg("Login Successful! Redirecting to Dashboard...", "success");
                    
                    // Secure Session Created. Redirecting...
                    setTimeout(() => {
                        window.location.href = "home_screen.html";
                    }, 1500);
                })
                .catch((error) => {
                    console.error("OTP Verification Error:", error);
                    showMsg("Invalid or Expired OTP. Try again.", "error");
                    btn.innerHTML = 'Verify & Login <i class="fas fa-check-circle"></i>';
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
