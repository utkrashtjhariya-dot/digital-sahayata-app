<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Login | Digital Sahayata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #ffffff; --surface: #f8fafc; --text-dark: #0f172a; --text-mute: #64748b;
            --brand: #2563eb; --brand-glow: rgba(37, 99, 235, 0.2); --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }

        /* Top Branding */
        .auth-header {
            padding: 40px 25px 20px 25px;
            padding-top: calc(40px + env(safe-area-inset-top));
            text-align: center;
        }
        .logo-box {
            width: 70px; height: 70px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: var(--brand); margin: 0 auto 20px auto;
            box-shadow: 0 10px 25px var(--brand-glow);
        }
        .auth-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .auth-header p { color: var(--text-mute); font-size: 0.95rem; font-weight: 500; }

        /* Form Section */
        .auth-form { padding: 30px 25px; flex: 1; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .input-icon { position: absolute; left: 18px; top: 38px; color: var(--text-mute); font-size: 1.1rem; }
        
        .input-field {
            width: 100%; padding: 16px 16px 16px 45px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; font-size: 1rem; color: var(--text-dark);
            outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-glow); background: var(--bg); }

        .forgot-pass { display: block; text-align: right; color: var(--brand); font-size: 0.85rem; font-weight: 600; text-decoration: none; margin-top: -10px; margin-bottom: 25px; }

        .btn-auth {
            width: 100%; padding: 18px; background: var(--brand); color: white;
            border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 10px 20px var(--brand-glow);
        }
        .btn-auth:active { transform: scale(0.98); }

        /* Toggle Login/Signup */
        .auth-toggle { text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-mute); font-weight: 500; }
        .auth-toggle span { color: var(--brand); font-weight: 700; cursor: pointer; }

        /* Status Message */
        #authMsg { text-align: center; margin-top: 15px; font-size: 0.9rem; font-weight: 600; min-height: 20px; }
        .msg-error { color: #ef4444; }
        .msg-success { color: #10b981; }

        /* Hide specific elements based on mode */
        .signup-only { display: none; }
        body.signup-mode .signup-only { display: block; }
        body.signup-mode .login-only { display: none; }
    </style>
</head>
<body>

    <div class="auth-header">
        <div class="logo-box"><i class="fas fa-fingerprint"></i></div>
        <h1 id="pageTitle">Welcome Back</h1>
        <p id="pageDesc">Secure login to your Mandla Hub account.</p>
    </div>

    <div class="auth-form">
        <div class="input-group signup-only">
            <label>Full Name</label>
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="userName" class="input-field" placeholder="Enter your full name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="userEmail" class="input-field" placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="userPass" class="input-field" placeholder="••••••••">
        </div>

        <a href="#" class="forgot-pass login-only">Forgot Password?</a>

        <button class="btn-auth" id="actionBtn" onclick="processAuth()">Login <i class="fas fa-arrow-right"></i></button>
        
        <div id="authMsg"></div>

        <div class="auth-toggle login-only">
            New to Digital Sahayata? <span onclick="toggleMode()">Create Account</span>
        </div>
        <div class="auth-toggle signup-only">
            Already have an account? <span onclick="toggleMode()">Login Here</span>
        </div>
    </div>

    <script>
        let isSignupMode = false;

        function toggleMode() {
            isSignupMode = !isSignupMode;
            if(isSignupMode) {
                document.body.classList.add('signup-mode');
                document.getElementById('pageTitle').innerText = "Create Account";
                document.getElementById('pageDesc').innerText = "Join the 100 Crore Network today.";
                document.getElementById('actionBtn').innerHTML = 'Sign Up <i class="fas fa-user-plus"></i>';
            } else {
                document.body.classList.remove('signup-mode');
                document.getElementById('pageTitle').innerText = "Welcome Back";
                document.getElementById('pageDesc').innerText = "Secure login to your Mandla Hub account.";
                document.getElementById('actionBtn').innerHTML = 'Login <i class="fas fa-arrow-right"></i>';
            }
            document.getElementById('authMsg').innerHTML = "";
        }

        function processAuth() {
            const email = document.getElementById('userEmail').value.trim();
            const pass = document.getElementById('userPass').value.trim();
            const msgDiv = document.getElementById('authMsg');
            const btn = document.getElementById('actionBtn');

            if(!email || !pass) {
                msgDiv.innerHTML = '<span class="msg-error"><i class="fas fa-exclamation-circle"></i> Please fill all fields.</span>';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.style.opacity = '0.8';

            // Simulation of Auth Logic (Will connect to Firebase Auth in next step)
            setTimeout(() => {
                msgDiv.innerHTML = '<span class="msg-success"><i class="fas fa-check-circle"></i> Authentication Successful!</span>';
                btn.style.background = '#10b981';
                btn.innerHTML = 'Secured <i class="fas fa-shield-alt"></i>';
                
                // Redirect to Home Screen after login
                setTimeout(() => {
                    window.location.href = "home_screen.html";
                }, 1500);
            }, 1500);
        }
    </script>
</body>
</html>
