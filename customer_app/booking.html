<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Book Service | Digital Sahayata</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --text-dark: #0f172a; --text-mute: #64748b;
            --brand-blue: #2563eb; --brand-light: #eff6ff; --border: #e2e8f0; --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-dark); overflow-x: hidden; }

        /* Simple Header */
        .header {
            background: var(--surface); padding: 15px 5%;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            color: var(--text-dark); text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 8px; font-size: 1rem; transition: 0.2s;
        }
        .back-btn:hover { color: var(--brand-blue); }
        .header-title { font-weight: 800; font-size: 1.2rem; }

        /* Booking Form Container */
        .booking-container {
            max-width: 600px; margin: 40px auto; padding: 0 20px;
        }
        .form-card {
            background: var(--surface); border-radius: 16px; padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); border: 1px solid var(--border);
        }

        .service-banner {
            background: var(--brand-light); border-radius: 12px; padding: 20px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border: 1px solid #bfdbfe;
        }
        .s-icon { width: 50px; height: 50px; background: var(--brand-blue); color: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .s-info h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
        .s-info p { font-size: 0.85rem; color: var(--text-mute); font-weight: 500; }

        /* Form Fields */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }
        .input-group input, .input-group select {
            width: 100%; padding: 14px 15px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 1rem; color: var(--text-dark); outline: none; transition: 0.2s;
            background: var(--bg); font-family: 'Inter', sans-serif;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--brand-blue); background: var(--surface); }

        .file-upload {
            border: 2px dashed var(--border); padding: 30px; text-align: center;
            border-radius: 10px; cursor: pointer; transition: 0.2s; background: var(--bg);
        }
        .file-upload:hover { border-color: var(--brand-blue); background: var(--brand-light); }
        .file-upload i { font-size: 2rem; color: var(--brand-blue); margin-bottom: 10px; }
        .file-upload p { font-size: 0.9rem; font-weight: 600; color: var(--text-mute); }

        .price-breakdown {
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 15px; margin: 25px 0;
        }
        .p-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-mute); font-weight: 500; }
        .p-row.total { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 0; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--success); color: white;
            border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 800;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3); }

    </style>
</head>
<body>

    <header class="header">
        <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="header-title">Create Request</div>
        <div style="width: 100px;"></div> </header>

    <div class="booking-container">
        <div class="form-card">
            
            <div class="service-banner">
                <div class="s-icon"><i class="fas fa-file-signature"></i></div>
                <div class="s-info">
                    <h2>Service Application</h2>
                    <p>Fast & secure processing via verified partners.</p>
                </div>
            </div>

            <form action="../index.html" onsubmit="event.preventDefault(); alert('Order Created Successfully! Redirecting...'); window.location.href='../index.html';">
                
                <div class="input-group">
                    <label>Select Service</label>
                    <select required>
                        <option value="">-- Choose a service --</option>
                        <option value="pan_new">New PAN Card Apply</option>
                        <option value="pan_update">PAN Card Correction</option>
                        <option value="aadhaar_print">Aadhaar PVC Print</option>
                        <option value="itr">Income Tax Return (ITR)</option>
                        <option value="startup">Startup Registration</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Applicant Full Name</label>
                    <input type="text" placeholder="Enter name exactly as per documents" required>
                </div>

                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" placeholder="+91" required>
                </div>

                <div class="input-group">
                    <label>Upload Supporting Document (Aadhaar/Photo)</label>
                    <div class="file-upload">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to browse or drag file here</p>
                    </div>
                </div>

                <div class="price-breakdown">
                    <div class="p-row"><span>Service Charge</span> <span>₹100</span></div>
                    <div class="p-row"><span>Platform Fee</span> <span>₹50</span></div>
                    <div class="p-row total"><span>Total Amount</span> <span>₹150</span></div>
                </div>

                <button type="submit" class="btn-submit">Proceed to Pay ₹150</button>
            </form>

        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script>
        // AAPKI ASLI FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBmdEmqUIiP0hr_Ixfu6s83KBJfeTHgFkw",
            authDomain: "digital-sahayata-f3ede.firebaseapp.com",
            projectId: "digital-sahayata-f3ede",
            storageBucket: "digital-sahayata-f3ede.firebasestorage.app",
            messagingSenderId: "532380574288",
            appId: "1:532380574288:web:f306370320e448f09b6755"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Intercept form submission
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop normal fake redirect
            
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating Secure Order...';
            submitBtn.disabled = true;

            // Fetch data from form
            const serviceType = document.querySelector('select').value;
            const applicantName = document.querySelectorAll('input')[0].value;
            const contactNumber = document.querySelectorAll('input')[1].value;

            // Create Order ID
            const orderId = "DSN" + Math.floor(100000 + Math.random() * 900000);

            // SAVE TO FIREBASE FIRESTORE
            db.collection("3_ORDERS").doc(orderId).set({
                order_id: orderId,
                customer_name: applicantName,
                contact_phone: contactNumber,
                service_requested: serviceType,
                payment_status: "PENDING_PAYMENT",
                order_status: "NEW_REQUEST",
                total_amount_inr: 150,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert("Order " + orderId + " Created Successfully in Database!");
                window.location.href = '../index.html'; // Redirect to home
            })
            .catch((error) => {
                console.error("Error writing document: ", error);
                alert("System Error: Could not save order. Please try again.");
                submitBtn.innerHTML = 'Proceed to Pay ₹150';
                submitBtn.disabled = false;
            });
        });
    </script>
    
</body>
</html>
